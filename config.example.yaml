# Public-safe example config for the bibliography-linked literature wiki.
# Keep local paths and provider values in config.local.yaml or environment variables.

bibliography_file: "regex-tag.bib"
template_file: "specs/lit-note-template.md"

cache_dir: "cache"
raw_dir: "raw"
extracted_dir: "extracted"
wiki_dir: "wiki"
graph_dir: "graph"
watch_dir: "watch"
processed_subdir: "processed"
other_subdir: "other"
show_completion_dialog: true

provider:
  backend: "heuristic"       # heuristic | lm_studio | openai | gemini
  model: "gemma-4-e4b-it"
  api_base: ""               # Set in config.local.yaml or LIT_WIKI_API_BASE
  api_key_env: "LIT_WIKI_API_KEY"
  timeout_seconds: 60
