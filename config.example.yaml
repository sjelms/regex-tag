# Public-safe example config for the bibliography-linked literature wiki.
# Keep local paths and provider values in config.local.yaml or environment variables.

bibliography_file: "regex-tag.bib"
template_file: "specs/lit-note-template.md"

cache_dir: "cache"
raw_dir: "raw"
extracted_dir: "extracted"
wiki_dir: "wiki"
graph_dir: "graph"
watch_dir: "watch"
processed_subdir: "processed"
other_subdir: "other"
show_completion_dialog: true

provider:
  families:
    openai:
      label: "OpenAI"
      provider: "openai"
      task_models:
        default: "gpt-5-nano"
        extraction: "gpt-5-mini"
        summary: "gpt-5.4"
      models:
        gpt-5.4: "gpt-5.4"
        gpt-5-mini: "gpt-5-mini"
        gpt-5-nano: "gpt-5-nano"

    gemini:
      label: "Gemini"
      provider: "google"
      task_models:
        default: "gemini-3.1-flash-lite-preview"
        extraction: "gemini-3-flash-preview"
        summary: "gemini-3.1-pro-preview"
      models:
        gemini-3.1-pro-preview: "gemini-3.1-pro-preview"
        gemini-3-flash-preview: "gemini-3-flash-preview"
        gemini-3.1-flash-lite-preview: "gemini-3.1-flash-lite-preview"

  primary:
    backend: "heuristic"     # heuristic | lm_studio | openai_compatible | openai | gemini
    model: "gemma-4-e4b-it"
    api_base: ""             # Set in config.local.yaml or env for live providers
    api_key_env: "LIT_WIKI_API_KEY"
    timeout_seconds: 60

  fallbacks:
    - name: "openai_summary"
      family: "openai"
      task_model: "summary"
      api_base: ""
      api_key_env: "OPENAI_API_KEY"
      timeout_seconds: 60

    - name: "gemini_extraction"
      family: "gemini"
      task_model: "extraction"
      api_base: ""
      api_key_env: "GEMINI_API_KEY"
      timeout_seconds: 60

  retry_policy:
    local_max_attempts: 2

  approval:
    required: true
    default_decision: "prompt"   # prompt | approve | skip | cancel

  budget:
    max_input_chars_per_request: 12000
    max_output_tokens_per_request: 1200
    max_requests_per_file: 4
    max_tokens_per_file: 12000
    max_tokens_per_day: 50000
    max_estimated_cost_per_file: 0.0
    max_estimated_cost_per_day: 0.0

keywords:
  enabled: false
  unambiguous_csv: "unambiguous-keywords.csv"
  ambiguous_json: "ambiguous-keywords.json"
  mode: "guidance_enrichment"
  max_guidance_terms: 20
  max_see_also_links: 10
