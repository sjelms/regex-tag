# Configure repository-specific paths. Provide absolute paths or use ~ for your home directory.

# This file is for your local configuration and is ignored by Git.

# Directory containing the single file with all terms.
# Used by the keyword generation script.
term_source_file: "_helper/parent-list-terms_2025-10-08_155312.md"

# Directories scanned by link_authors.py and link_keywords.py.
scan_directories:
  - "_helper/test"

# Data files used across scripts (relative paths resolve from the repo root).
authors_json_file: "authors.json"
unambiguous_keywords_csv: "unambiguous-keywords.csv"
ambiguous_keywords_json: "ambiguous-keywords.json"

provider:
  families:
    openai:
      label: "OpenAI"
      provider: "openai"
      task_models:
        default: "gpt-5-nano"
        extraction: "gpt-5-mini"
        summary: "gpt-5.4"
      models:
        gpt-5.4: "gpt-5.4"
        gpt-5-mini: "gpt-5-mini"
        gpt-5-nano: "gpt-5-nano"

    gemini:
      label: "Gemini"
      provider: "google"
      task_models:
        default: "gemini-3.1-flash-lite-preview"
        extraction: "gemini-3-flash-preview"
        summary: "gemini-3.1-pro-preview"
      models:
        gemini-3.1-pro-preview: "gemini-3.1-pro-preview"
        gemini-3-flash-preview: "gemini-3-flash-preview"
        gemini-3.1-flash-lite-preview: "gemini-3.1-flash-lite-preview"

  primary:
    backend: "heuristic"
    model: "gemma-4-e4b-it"

  fallbacks:
    - name: "openai_summary"
      family: "openai"
      task_model: "summary"
      api_key_env: "OPENAI_API_KEY"

    - name: "gemini_extraction"
      family: "gemini"
      task_model: "extraction"
      api_key_env: "GEMINI_API_KEY"

keywords:
  enabled: true
  unambiguous_csv: "unambiguous-keywords.csv"
  ambiguous_json: "ambiguous-keywords.json"
  mode: "guidance_enrichment"
  max_guidance_terms: 20
  max_see_also_links: 3
  max_metadata_tags: 3
  min_body_matches: 3
